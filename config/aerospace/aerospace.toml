# AeroSpace Config
# Docs: https://nikitabobko.github.io/AeroSpace/guide

config-version = 2

after-startup-command = ['exec-and-forget /Users/stevedv/.local/bin/aerospace-workspace-caps']
exec-on-workspace-change = ['/bin/zsh', '-lc', '/Users/stevedv/.local/bin/aerospace-workspace-caps']

# Start at login
start-at-login = true

# Normalizations
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Layout defaults - column-style tiles
default-root-container-layout = 'tiles'
default-root-container-orientation = 'horizontal'

# Accordion padding (only used if you switch to accordion mode)
accordion-padding = 30

# Do not warp the cursor when focus moves across monitors

# Workspaces: dedicated terminal workspace plus five numeric workspaces
persistent-workspaces = ['__TERMINAL_WORKSPACE__', '1', '2', '3', '4', '5']

[key-mapping]
preset = 'qwerty'

[gaps]
inner.horizontal = 10
inner.vertical = 10
outer.left = 0
outer.bottom = 0
outer.top = 0
outer.right = 0

[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']
f = ['layout floating tiling', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']
alt-shift-leftSquareBracket = ['join-with left', 'mode main']
alt-shift-rightSquareBracket = ['join-with right', 'mode main']

[mode.main.binding]
# Layout toggles
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'

# Focus left/right - crosses monitor boundaries, wraps around
alt-leftSquareBracket = 'focus --boundaries all-monitors-outer-frame --boundaries-action wrap-around-all-monitors left'
alt-rightSquareBracket = 'focus --boundaries all-monitors-outer-frame --boundaries-action wrap-around-all-monitors right'

# Move windows left/right
alt-shift-leftSquareBracket = 'move left'
alt-shift-rightSquareBracket = 'move right'

# Resize
alt-minus = 'resize smart -50'
alt-equal = 'resize smart +50'

# Workspaces
ctrl-1 = 'workspace 1'
ctrl-2 = 'workspace 2'
ctrl-3 = 'workspace 3'
ctrl-4 = 'workspace 4'
ctrl-5 = 'workspace 5'

# Move window to workspace
ctrl-shift-1 = ['move-node-to-workspace 1', 'exec-and-forget /Users/stevedv/.local/bin/aerospace-workspace-caps']
ctrl-shift-2 = ['move-node-to-workspace 2', 'exec-and-forget /Users/stevedv/.local/bin/aerospace-workspace-caps']
ctrl-shift-3 = ['move-node-to-workspace 3', 'exec-and-forget /Users/stevedv/.local/bin/aerospace-workspace-caps']
ctrl-shift-4 = ['move-node-to-workspace 4', 'exec-and-forget /Users/stevedv/.local/bin/aerospace-workspace-caps']
ctrl-shift-5 = ['move-node-to-workspace 5', 'exec-and-forget /Users/stevedv/.local/bin/aerospace-workspace-caps']

# Quick workspace switching
alt-tab = 'workspace-back-and-forth'
alt-shift-tab = ['move-workspace-to-monitor --wrap-around next', 'exec-and-forget /Users/stevedv/.local/bin/aerospace-workspace-caps']
ctrl-quote = 'exec-and-forget /Users/stevedv/.local/bin/aerospace-terminal-toggle'

# App launchers
alt-g = 'exec-and-forget open -a Ghostty'
alt-h = 'exec-and-forget open -a Helium'

# Service mode
alt-shift-semicolon = 'mode service'

[[on-window-detected]]
run = ['exec-and-forget /Users/stevedv/.local/bin/aerospace-workspace-caps']

[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
run = ['exec-and-forget /Users/stevedv/.local/bin/aerospace-terminal-toggle route-first-window']
